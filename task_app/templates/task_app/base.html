<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #222;
        }
        header {
            background: #1f3c88;
            color: white;
            padding: 1rem 2rem;
        }
        nav a {
            color: white;
            margin-right: 1rem;
            text-decoration: none;
            font-weight: bold;
        }
        main {
            padding: 2rem;
            max-width: 1000px;
            margin: auto;
            background: white;
            min-height: 80vh;
        }
        h1, h2 {
            color: #1f3c88;
        }
        a.button, button {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #1f3c88;
            color: white;
            text-decoration: none;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: #fafafa;
        }
        form p {
            margin-bottom: 1rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <h1>Task Management App</h1>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'organization-list' %}">Organizations</a>
            <a href="{% url 'project-list' %}">Projects</a>
            <a href="{% url 'taskstatus-list' %}">Task Statuses</a>
            <a href="{% url 'task-list' %}">Tasks</a>
            <a href="/admin/">Admin</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
